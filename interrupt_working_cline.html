<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISC-V Interrupt Simulator</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #29293e;
            --control-bg: #3c3c54;
            --text-color: #cdd6f4;
            --heading-color: #89b4fa;
            --reg-color: #f9e2af;
            --highlight-bg: #444466;
            --highlight-border: #a6e3a1;
            --vector-bg: #ffd598;
            --vector-border: #f9e2af;
            --glow-color: #f38ba8;
            --active-color: #f38ba8;
            --handled-color: #a6e3a1;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        h1 { font-size: 1.5em; color: var(--heading-color); margin: 10px 0; }
        h2 { font-size: 1em; margin: 5px 0; color: var(--heading-color); }
        h3 { font-size: 0.9em; margin: 5px 0; color: var(--heading-color); }

        /* Layout Structure */
        .header-controls {
            width: 100%;
            max-width: 800px;
            background: var(--control-bg);
            padding: 8px 10px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .mode-group { display: flex; flex-direction: column; gap: 4px; }
        .mode-option { display: flex; align-items: center; gap: 5px; font-size: 0.85em; }

        .button-group { display: flex; gap: 8px; }
        button {
            background: #45475a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }
        button:hover { background: #585b70; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #state-display {
            font-weight: bold;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 1px solid var(--heading-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 10px;
        }

        /* Desktop layout: radio buttons and buttons side by side */
        @media (min-width: 769px) {
            .header-controls {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 20px;
            }
        }

        .panel {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #313244;
        }

        /* Registers & Peripherals */
        #registers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        .reg-box {
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 4px;
            text-align: center;
        }
        .reg-label { font-size: 0.7em; display: block; opacity: 0.7; }
        .reg-val { color: var(--reg-color); font-weight: bold; font-size: 1em; }

        #interrupt-controller {
            display: flex;
            flex-direction: row; /* Force horizontal on desktop */
            flex-wrap: nowrap;    /* Prevent wrapping */
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .peripheral {
            width: 140px;
            padding: 8px;
            background: #313244;
            border: 2px solid transparent;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-size: 0.85em;
            flex-shrink: 0; /* Prevent shrinking */
        }
        .peripheral.asserted-trigger {
            border-color: var(--glow-color);
            box-shadow: 0 0 8px var(--glow-color);
        }
        .peripheral-irq {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: #11111b;
        }
        .peripheral-irq.asserted { background: var(--glow-color); }

        /* Code Display */
        .code-block {
            background: #11111b;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.8em;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            scroll-behavior: smooth;
        }
        .instruction {
            display: flex;
            padding: 2px 4px;
            border-radius: 2px;
            white-space: pre;
        }
        .instruction.highlight {
            background: var(--highlight-bg);
            border-left: 3px solid var(--highlight-border);
        }
        .instruction.active-vector {
            background: var(--vector-bg);
            color: #000;
            border-left: 3px solid var(--vector-border);
        }
        .addr { color: #585b70; margin-right: 10px; min-width: 50px; display: inline-block; }

        /* Vector Table */
        #vector-table-display {
            margin-top: 10px;
            font-size: 0.8em;
            border-top: 1px solid #45475a;
            padding-top: 5px;
        }
        .vector-entry { padding: 2px 4px; }
        .vector-entry.active-vector { background: var(--vector-bg); color: #000; }

        /* Polling Indicators */
        .polling-group { display: flex; gap: 10px; margin: 5px 0; }
        .polling-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #313244;
        }
        .polling-indicator.active { background: var(--active-color); }
        .polling-indicator.handled { background: var(--handled-color); }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .header-controls { flex-direction: column; align-items: stretch; }
            .mode-group, .button-group { width: 100%; }
            .button-group { justify-content: space-around; }
            .container { flex-direction: column; }
            .panel { width: 100%; }
            #interrupt-controller { flex-direction: column; align-items: center; }
            .peripheral { width: 180px; }
            h1 { font-size: 1.2em; }
            h2 { font-size: 1em; }
            h3 { font-size: 0.9em; }
            .code-block { font-size: 0.7em; max-height: 80px; }
            #registers { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <h1>🧠 RISC-V Interrupt Simulator</h1>

    <div class="header-controls">
        <div class="mode-group">
            <div class="mode-option">
                <input type="radio" name="mode" id="mode-vectored" value="vectored" checked>
                <label for="mode-vectored">Vectored Mode</label>
            </div>
            <div class="mode-option">
                <input type="radio" name="mode" id="mode-nonvectored" value="nonvectored">
                <label for="mode-nonvectored">Non-Vectored Mode</label>
            </div>
        </div>
        <div class="button-group">
            <button id="btn-reset" title="Reset">↻</button>
            <button id="btn-back" title="Step Back">⏪ Back</button>
            <button id="btn-step" title="Next Step">⏩ Step</button>
        </div>
    </div>

    <div id="state-display">State: MAIN_RUNNING</div>

    <div class="container">
        <!-- Left Panel: CPU & Peripherals -->
        <div class="panel">
            <h2>CPU Registers</h2>
            <div id="registers">
                <div class="reg-box"><span class="reg-label">PC</span><span id="reg-pc" class="reg-val">0x0000</span></div>
                <div class="reg-box"><span class="reg-label">EPC</span><span id="reg-epc" class="reg-val">N/A</span></div>
                <div class="reg-box"><span class="reg-label">IRQ ID</span><span id="reg-irq" class="reg-val">N/A</span></div>
            </div>

            <h2>Peripherals</h2>
            <div id="interrupt-controller">
                <div class="peripheral" id="peri-1" onclick="triggerInterrupt(1)">
                    <span>Periph 1</span>
                    <div class="peripheral-irq" id="irq-1"></div>
                </div>
                <div class="peripheral" id="peri-2" onclick="triggerInterrupt(2)">
                    <span>Periph 2</span>
                    <div class="peripheral-irq" id="irq-2"></div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Code & Memory -->
        <div class="panel">
            <div id="code-sections">
                <h2>Main Program</h2>
                <div id="main-program" class="code-block"></div>

                <div id="isr-vectored-container">
                    <h2>Vectored ISRs</h2>
                    <div id="isr-a" class="code-block"></div>
                    <div id="isr-b" class="code-block"></div>
                </div>

                <div id="isr-nonvectored-container" style="display: none;">
                    <h2>Non-Vectored ISR</h2>
                    <div id="isr-nv" class="code-block"></div>
                    <div class="polling-group">
                        <div class="polling-indicator" id="poll-1"></div>
                        <div class="polling-indicator" id="poll-2"></div>
                    </div>
                    <h3>Handlers</h3>
                    <div id="handle-1" class="code-block"></div>
                    <div id="handle-2" class="code-block"></div>
                </div>

                <div id="vector-table-display">
                    <h2>Vector Table</h2>
                    <div id="v-table-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /** --- DATA STRUCTURES --- **/
        const MEMORY = {
            "0x0000": "lw t0, 0(s0)",
            "0x0004": "addi t0, t0, 1",
            "0x0008": "sw t0, 0(s0)",
            "0x000C": "bne t3, t4, 0x0000",
            "0x8000": "ack_int_1",
            "0x8004": "addi t1, t1, 10",
            "0x8008": "eret",
            "0x8800": "ack_int_2",
            "0x8804": "addi t2, t2, 20",
            "0x8808": "eret",
            "0x9000": "lw t3, INT_STATUS",
            "0x9004": "bne t3, ID_1, 0x900C",
            "0x9008": "jal ra, 0x9100",
            "0x900C": "bne t3, ID_2, 0x9014",
            "0x9010": "jal ra, 0x9200",
            "0x9014": "eret",
            "0x9100": "ack_int_1",
            "0x9104": "addi t1, t1, 10",
            "0x9108": "ret",
            "0x9200": "ack_int_2",
            "0x9204": "addi t2, t2, 20",
            "0x9208": "ret"
        };

        const VECTOR_TABLE = [
            { id: 1, addr: "0x8000", label: "IRQ 1" },
            { id: 2, addr: "0x8800", label: "IRQ 2" }
        ];

        let state = {
            pc: 0x0000,
            epc: null,
            interruptId: null,
            interruptActive: false,
            mode: 'vectored',
            currentState: 'MAIN_RUNNING',
            pollingStatus: { 1: 'none', 2: 'none' }
        };

        let history = [];

        function saveState() {
            history.push(JSON.stringify(state));
            if (history.length > 50) history.shift();
        }

        function stepBack() {
            if (history.length === 0) return;
            state = JSON.parse(history.pop());
            render();
        }

        function nextStep() {
            saveState();
            switch (state.currentState) {
                case 'MAIN_RUNNING': handleMainRunning(); break;
                case 'INTERRUPT_PENDING': handleInterruptPending(); break;
                case 'CONTEXT_SWITCH': handleContextSwitch(); break;
                case 'ISR_RUNNING': handleISRRunning(); break;
                case 'INTERRUPT_RETURN': handleInterruptReturn(); break;
            }
            render();
        }

        function handleMainRunning() {
            state.pc += 4;
            if (state.pc > 0x000C) state.pc = 0x0000;
        }

        function handleInterruptPending() {
            if (state.mode === 'vectored') {
                state.currentState = 'CONTEXT_SWITCH';
            } else {
                state.epc = state.pc;
                state.pc = 0x9000;
                state.currentState = 'ISR_RUNNING';
            }
        }

        function handleContextSwitch() {
            state.epc = state.pc;
            const vector = VECTOR_TABLE.find(v => v.id === state.interruptId);
            state.pc = parseInt(vector.addr, 16);
            state.currentState = 'ISR_RUNNING';
        }

        function handleISRRunning() {
            const currentPCStr = "0x" + state.pc.toString(16).toUpperCase().padStart(4, '0');
            const instr = MEMORY[currentPCStr];

            if (instr && instr.startsWith('ack_int')) {
                state.interruptActive = false; 
            }

            if (state.mode === 'nonvectored') {
                if (state.pc === 0x9004) {
                    if (state.interruptId === 1) state.pc = 0x9008;
                    else state.pc = 0x900C;
                } 
                else if (state.pc === 0x9008) state.pc = 0x9100;
                else if (state.pc === 0x900C) {
                    if (state.interruptId === 2) state.pc = 0x9010;
                    else state.pc = 0x9014;
                }
                else if (state.pc === 0x9010) state.pc = 0x9200;
                else if (state.pc === 0x9108 || state.pc === 0x9208) {
                    state.pc = (state.pc === 0x9108) ? 0x900C : 0x9014;
                }
                else if (state.pc === 0x9014) state.currentState = 'INTERRUPT_RETURN';
                else state.pc += 4;
            } else {
                if (instr === 'eret') state.currentState = 'INTERRUPT_RETURN';
                else state.pc += 4;
            }
        }

        function handleInterruptReturn() {
            state.pc = state.epc;
            state.epc = null;
            state.interruptId = null;
            state.interruptActive = false;
            state.currentState = 'MAIN_RUNNING';
            state.pollingStatus = { 1: 'none', 2: 'none' };
        }

        function triggerInterrupt(id) {
            if (state.currentState !== 'MAIN_RUNNING') return;
            state.interruptId = id;
            state.interruptActive = true;
            state.currentState = 'INTERRUPT_PENDING';
            if (state.mode === 'nonvectored') state.pollingStatus[id] = 'active';
            render();
        }

        function render() {
            document.getElementById('state-display').innerText = `State: ${state.currentState} ${state.mode === 'vectored' ? '(Vectored)' : '(Non-Vectored)'}`;
            document.getElementById('reg-pc').innerText = '0x' + state.pc.toString(16).toUpperCase().padStart(4, '0');
            document.getElementById('reg-epc').innerText = state.epc !== null ? '0x' + state.epc.toString(16).toUpperCase().padStart(4, '0') : 'N/A';
            document.getElementById('reg-irq').innerText = state.interruptId !== null ? state.interruptId : 'N/A';

            [1, 2].forEach(id => {
                const peri = document.getElementById(`peri-${id}`);
                const irq = document.getElementById(`irq-${id}`);
                peri.classList.toggle('asserted-trigger', state.interruptActive && state.interruptId === id);
                irq.classList.toggle('asserted', state.interruptActive && state.interruptId === id);
            });

            document.getElementById('btn-back').disabled = history.length === 0;
            renderCode('main-program', 0x0000, 0x000C);
            
            const isVectored = state.mode === 'vectored';
            document.getElementById('isr-vectored-container').style.display = isVectored ? 'block' : 'none';
            document.getElementById('isr-nonvectored-container').style.display = isVectored ? 'none' : 'block';
            document.getElementById('vector-table-display').style.display = isVectored ? 'block' : 'none';

            if (isVectored) {
                renderCode('isr-a', 0x8000, 0x8008);
                renderCode('isr-b', 0x8800, 0x8808);
            } else {
                renderCode('isr-nv', 0x9000, 0x9014);
                renderCode('handle-1', 0x9100, 0x9108);
                renderCode('handle-2', 0x9200, 0x9208);
                document.getElementById('poll-1').className = 'polling-indicator ' + state.pollingStatus[1];
                document.getElementById('poll-2').className = 'polling-indicator ' + state.pollingStatus[2];
            }

            const vTableContent = document.getElementById('v-table-content');
            vTableContent.innerHTML = '';
            VECTOR_TABLE.forEach(v => {
                const div = document.createElement('div');
                div.className = 'vector-entry';
                if (state.currentState === 'CONTEXT_SWITCH' && state.interruptId === v.id) div.classList.add('active-vector');
                div.innerHTML = `${v.label} &rarr; ${v.addr}`;
                vTableContent.appendChild(div);
            });

            // --- AUTO SCROLL LOGIC ---
            // After rendering, find the highlighted instruction in every code block and scroll to it
            document.querySelectorAll('.code-block').forEach(block => {
                const highlighted = block.querySelector('.instruction.highlight');
                if (highlighted) {
                    // scrollIntoView with 'nearest' is the most efficient way to ensure 
                    // the element is visible within its scrollable container
                    highlighted.scrollIntoView({ block: 'nearest', inline: 'start' });
                }
            });
        }

        function renderCode(containerId, startAddr, endAddr) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let addr = startAddr; addr <= endAddr; addr += 4) {
                const addrStr = '0x' + addr.toString(16).toUpperCase().padStart(4, '0');
                const instr = MEMORY[addrStr] || 'nop';
                const div = document.createElement('div');
                div.className = 'instruction';
                if (state.pc === addr) div.classList.add('highlight');
                if (state.currentState === 'CONTEXT_SWITCH' && state.mode === 'vectored') {
                    const vector = VECTOR_TABLE.find(v => v.id === state.interruptId);
                    if (vector && addr === parseInt(vector.addr, 16)) div.classList.add('active-vector');
                }
                div.innerHTML = `<span class="addr">${addrStr}:</span><span class="text">${instr}</span>`;
                container.appendChild(div);
            }
        }

        function resetSimulation() {
            state = {
                pc: 0x0000,
                epc: null,
                interruptId: null,
                interruptActive: false,
                mode: document.querySelector('input[name="mode"]:checked').value,
                currentState: 'MAIN_RUNNING',
                pollingStatus: { 1: 'none', 2: 'none' }
            };
            history = [];
            render();
        }

        document.getElementById('btn-step').addEventListener('click', nextStep);
        document.getElementById('btn-back').addEventListener('click', stepBack);
        document.getElementById('btn-reset').addEventListener('click', resetSimulation);
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.mode = e.target.value;
                resetSimulation();
            });
        });

        resetSimulation();
    </script>
</body>
</html>
