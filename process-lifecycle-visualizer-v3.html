<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Process Lifecycle Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e27;
    --bg-card: #0f1336;
    --bg-card-hover: #141845;
    --border: rgba(255,255,255,0.06);
    --text: #e0e0e0;
    --text-dim: #7a7f9e;
    --cyan: #00e5ff;
    --purple: #b388ff;
    --blue: #448aff;
    --amber: #ffd740;
    --green: #69f0ae;
    --red: #ff5252;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Outfit', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    padding: clamp(12px,2vw,20px) clamp(16px,3vw,32px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-weight: 700; font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: var(--font-mono);
    font-size: clamp(15px,2.2vw,18px);
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--blue); }
  .kbd-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    display: flex; gap: 6px; flex-wrap:wrap; align-items:center;
  }
  .kbd-hint kbd {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  /* ── Mode Bar ── */
  .mode-bar {
    display: flex;
    gap: 8px;
    padding: 10px clamp(16px,3vw,32px);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-wrap: nowrap;
  }
  .mode-btn {
    font-family: var(--font-mono);
    font-size: clamp(12px,1.4vw,13px);
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s;
    position: relative;
  }
  .mode-btn:hover { background: var(--bg-card-hover); color: var(--text); }
  .mode-btn.active {
    background: rgba(68,138,255,0.1);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 0 12px rgba(68,138,255,0.15);
  }
  .mode-btn .mode-num {
    display: inline-block;
    width: 18px; height: 18px;
    line-height: 18px;
    text-align: center;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    font-size: 10px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .mode-btn.active .mode-num {
    background: var(--blue);
    color: var(--bg);
  }

  /* ── Algorithm selector (Mode 4 only) ── */
  .algo-bar {
    display: none;
    gap: 8px;
    padding: 8px clamp(16px,3vw,32px);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-wrap: nowrap;
    align-items: center;
    background: rgba(68,138,255,0.03);
  }
  .algo-bar.visible { display: flex; }
  .algo-bar-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
    margin-right: 4px;
  }
  .algo-btn {
    font-family: var(--font-mono);
    font-size: clamp(11px,1.3vw,12px);
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s;
  }
  .algo-btn:hover { background: var(--bg-card-hover); color: var(--text); }
  .algo-btn.active {
    background: rgba(179,136,255,0.12);
    border-color: var(--purple);
    color: var(--purple);
  }

  /* ── Main Layout ── */
  .main {
    display: flex;
    gap: 0;
    height: calc(100vh - 110px);
  }
  .main.has-algo { height: calc(100vh - 150px); }
  .left-pane {
    flex: 0 0 65%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .right-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── SVG Canvas ── */
  .canvas-wrap {
    flex: 1;
    padding: clamp(8px,1.5vw,16px);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .canvas-wrap svg {
    width: 100%;
    height: 100%;
    max-height: 100%;
  }

  /* SVG styles */
  .state-node { cursor: default; }
  .state-label {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    fill: var(--text);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }
  .state-sublabel {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 12px;
    fill: var(--text-dim);
    text-anchor: middle;
    pointer-events: none;
  }
  .arrow-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 500;
    fill: var(--text-dim);
    text-anchor: middle;
    pointer-events: none;
  }
  .arrow-path {
    fill: none;
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.5;
    marker-end: url(#arrowhead);
  }
  .arrow-path.active {
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px currentColor);
  }
  .arrow-path.active-admit { stroke: var(--cyan); }
  .arrow-path.active-dispatch { stroke: var(--purple); }
  .arrow-path.active-timeout { stroke: var(--amber); }
  .arrow-path.active-ioreq { stroke: var(--amber); }
  .arrow-path.active-iodone { stroke: var(--green); }
  .arrow-path.active-exit { stroke: var(--green); }

  /* Process token */
  .process-token {
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .token-circle {
    stroke-width: 2;
    filter: drop-shadow(0 0 6px currentColor);
  }
  .token-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    fill: #fff;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  /* Running glow pulse */
  @keyframes cpuPulse {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.4; }
  }

  /* Kernel mode indicator */
  @keyframes kernelPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .kernel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    fill: #ff5252;
    text-anchor: middle;
    pointer-events: none;
    animation: kernelPulse 1.2s ease-in-out infinite;
  }

  /* ── Controls ── */
  .controls {
    padding: 12px clamp(16px,2vw,24px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: var(--font-mono);
    font-size: clamp(13px,1.5vw,14px);
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display:flex; align-items:center; gap:6px;
  }
  .ctrl-btn:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.15); }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn.primary {
    background: rgba(68,138,255,0.15);
    border-color: var(--blue);
    color: var(--blue);
  }
  .ctrl-btn.primary:hover { background: rgba(68,138,255,0.25); }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .step-counter {
    font-family: var(--font-mono);
    font-size: clamp(12px,1.4vw,13px);
    color: var(--text-dim);
    min-width: 80px;
    text-align: center;
  }

  /* ── Right Pane Panels ── */
  .panel {
    border-bottom: 1px solid var(--border);
    padding: clamp(14px,2vw,18px);
  }
  .panel-title {
    font-family: var(--font-mono);
    font-size: clamp(11px,1.3vw,12px);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: var(--blue);
    flex-shrink: 0;
  }

  /* Step description */
  .step-desc { flex: 0 0 auto; }
  .desc-what {
    font-size: clamp(14px,1.8vw,16px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 8px;
    color: #fff;
  }
  .desc-why {
    font-size: clamp(13px,1.5vw,14px);
    font-weight: 300;
    line-height: 1.65;
    color: var(--text-dim);
  }

  /* Process table */
  .proc-table-wrap { flex: 0 0 auto; overflow-x: auto; }
  .proc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(12px,1.4vw,13px);
  }
  .proc-table th {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: clamp(10px,1.2vw,11px);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .proc-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: clamp(12px,1.4vw,13px);
    white-space: nowrap;
  }
  .state-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .state-dot.new { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .state-dot.ready { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
  .state-dot.running { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .state-dot.blocked { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .state-dot.terminated { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* Event log */
  .event-log-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .event-log {
    flex: 1;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: clamp(11px,1.3vw,12px);
    line-height: 1.9;
    color: var(--text-dim);
    padding-right: 4px;
  }
  .event-log::-webkit-scrollbar { width: 4px; }
  .event-log::-webkit-scrollbar-track { background: transparent; }
  .event-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:2px; }
  .log-entry {
    padding: 2px 0;
    opacity: 0;
    animation: fadeIn 0.3s forwards;
  }
  .log-entry .log-step { color: var(--blue); font-weight: 500; }
  .log-empty { color: var(--text-dim); font-style: italic; opacity: 0.5; }

  @keyframes fadeIn { to { opacity:1; } }

  /* ── Mobile ── */
  @media (max-width: 1023px) {
    .main, .main.has-algo {
      flex-direction: column;
      height: auto;
    }
    .left-pane {
      flex: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .canvas-wrap {
      height: 55vw;
      min-height: 220px;
      max-height: 380px;
    }
    .right-pane {
      max-height: 55vh;
      overflow-y: auto;
    }
    .kbd-hint { display:none; }
    .mode-btn { padding: 8px 12px; }
    .algo-btn { padding: 6px 10px; }
  }

  /* Transition flash overlay on arrow */
  .flash-overlay {
    stroke-dasharray: 8 4;
    animation: dashFlow 0.6s linear infinite;
  }
  @keyframes dashFlow { to { stroke-dashoffset: -24; } }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">OS</div>
      <h1>Process <span>Lifecycle</span> Visualizer</h1>
    </div>
    <div class="kbd-hint">
      <kbd>←</kbd><kbd>→</kbd> navigate
      <kbd>R</kbd> reset
      <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> modes
    </div>
  </div>

  <!-- Mode bar -->
  <div class="mode-bar" id="modeBar"></div>

  <!-- Algorithm bar (Mode 4 only) -->
  <div class="algo-bar" id="algoBar">
    <span class="algo-bar-label">Algorithm:</span>
  </div>

  <!-- Main workspace -->
  <div class="main" id="mainWrap">
    <div class="left-pane">
      <div class="canvas-wrap">
        <svg id="svgCanvas" viewBox="0 0 720 380" preserveAspectRatio="xMidYMid meet">
          <defs>
            <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.25)" />
            </marker>
            <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="currentColor" />
            </marker>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <g id="stateNodes"></g>
          <g id="arrows"></g>
          <g id="tokens"></g>
        </svg>
      </div>
      <div class="controls" id="controls"></div>
    </div>
    <div class="right-pane">
      <div class="panel step-desc" id="descPanel">
        <div class="panel-title">What's Happening</div>
        <div class="desc-what" id="descWhat">Select a scenario and press Next to begin.</div>
        <div class="desc-why" id="descWhy">Each step simulates an OS event that moves processes between states.</div>
      </div>
      <div class="panel proc-table-wrap" id="tablePanel">
        <div class="panel-title">Process States</div>
        <table class="proc-table">
          <thead><tr><th>PID</th><th>State</th><th>Last Action</th></tr></thead>
          <tbody id="procTableBody"></tbody>
        </table>
      </div>
      <div class="panel event-log-wrap">
        <div class="panel-title">Event Log</div>
        <div class="event-log" id="eventLog">
          <div class="log-empty">Awaiting first event…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {

  const COLORS = {
    new: '#00e5ff',
    ready: '#b388ff',
    running: '#448aff',
    blocked: '#ffd740',
    terminated: '#69f0ae'
  };

  const PROCESS_COLORS = ['#00e5ff', '#ff80ab', '#ffd740'];

  // ═══════════════════════════════════════════════
  // STATE NODE GEOMETRY
  // Wider boxes, more spread out, tokens positioned
  // in dedicated slots BELOW the label text area
  // ═══════════════════════════════════════════════

  const STATES = {
    new:        { x: 65,  y: 110, w: 120, h: 70, label: 'NEW',     sub: 'Created' },
    ready:      { x: 260, y: 80,  w: 140, h: 65, label: 'READY',   sub: 'Queue' },
    running:    { x: 460, y: 80,  w: 110, h: 65, label: 'RUNNING', sub: 'CPU' },
    blocked:    { x: 350, y: 290, w: 140, h: 65, label: 'BLOCKED', sub: 'I/O Wait' },
    terminated: { x: 650, y: 110, w: 120, h: 70, label: 'DONE',    sub: 'Exited' }
  };

  // Token radius
  const TR = 13;
  // Spacing between token centers inside a queue
  const TOKEN_GAP = 32;

  function getSlotPos(state, slotIndex, totalInState) {
    const s = STATES[state];
    // Place tokens in a row near the bottom of the box
    const tokenY = s.y + 12;
    if (totalInState <= 1) {
      return { x: s.x, y: tokenY };
    }
    // Center the row of tokens
    const totalWidth = (totalInState - 1) * TOKEN_GAP;
    const startX = s.x - totalWidth / 2;
    return { x: startX + slotIndex * TOKEN_GAP, y: tokenY };
  }

  // ═══════════════════════════════════════════════
  // ARROW GEOMETRY
  // Computed from box edges with consistent convex
  // quadratic Bézier curves
  // ═══════════════════════════════════════════════

  function boxEdge(stateKey, side) {
    const s = STATES[stateKey];
    switch(side) {
      case 'right':  return { x: s.x + s.w/2, y: s.y };
      case 'left':   return { x: s.x - s.w/2, y: s.y };
      case 'top':    return { x: s.x, y: s.y - s.h/2 };
      case 'bottom': return { x: s.x, y: s.y + s.h/2 };
      case 'top-right': return { x: s.x + s.w/2 - 10, y: s.y - s.h/2 };
      case 'top-left':  return { x: s.x - s.w/2 + 10, y: s.y - s.h/2 };
      case 'bottom-right': return { x: s.x + s.w/4, y: s.y + s.h/2 };
      case 'bottom-left':  return { x: s.x - s.w/4, y: s.y + s.h/2 };
      case 'left-top': return { x: s.x - s.w/2, y: s.y - 10 };
      case 'right-bottom': return { x: s.x + s.w/2, y: s.y + 10 };
    }
  }

  function buildArrows() {
    // Admit: NEW right edge → READY left edge, gentle downward arc (like x²)
    const admit_s = boxEdge('new', 'right');
    const admit_e = boxEdge('ready', 'left');
    const admit_cpx = (admit_s.x + admit_e.x) / 2;
    const admit_cpy = Math.max(admit_s.y, admit_e.y) + 40;

    // Dispatch: READY right edge → RUNNING left edge, gentle arc upward
    const disp_s = boxEdge('ready', 'right');
    const disp_e = boxEdge('running', 'left');
    const disp_cpx = (disp_s.x + disp_e.x) / 2;
    const disp_cpy = disp_s.y - 30;

    // Timeout: RUNNING top → READY top, arc upward
    const to_s = boxEdge('running', 'top-left');
    const to_e = boxEdge('ready', 'top-right');
    const to_cpx = (to_s.x + to_e.x) / 2;
    const to_cpy = Math.min(to_s.y, to_e.y) - 50;

    // I/O Request: RUNNING bottom → BLOCKED right edge, arc rightward
    const ior_s = boxEdge('running', 'bottom');
    const ior_e = boxEdge('blocked', 'right');
    const ior_cp1x = ior_s.x + 30;
    const ior_cp1y = ior_s.y + 60;
    const ior_cp2x = ior_e.x + 40;
    const ior_cp2y = ior_e.y - 40;

    // I/O Done: BLOCKED left edge → READY bottom, arc leftward
    const iod_s = boxEdge('blocked', 'left');
    const iod_e = boxEdge('ready', 'bottom');
    const iod_cp1x = iod_s.x - 50;
    const iod_cp1y = iod_s.y - 50;
    const iod_cp2x = iod_e.x - 30;
    const iod_cp2y = iod_e.y + 60;

    // Exit: RUNNING right edge → TERMINATED left edge, gentle arc downward
    const ex_s = boxEdge('running', 'right');
    const ex_e = boxEdge('terminated', 'left');
    const ex_cpx = (ex_s.x + ex_e.x) / 2;
    const ex_cpy = ex_s.y + 30;

    return [
      { id: 'admit',    label: 'Admit',    path: `M ${admit_s.x},${admit_s.y} Q ${admit_cpx},${admit_cpy} ${admit_e.x},${admit_e.y}` },
      { id: 'dispatch', label: 'Dispatch', path: `M ${disp_s.x},${disp_s.y} Q ${disp_cpx},${disp_cpy} ${disp_e.x},${disp_e.y}` },
      { id: 'timeout',  label: 'Timeout',  label2: 'Preempted', path: `M ${to_s.x},${to_s.y} Q ${to_cpx},${to_cpy} ${to_e.x},${to_e.y}` },
      { id: 'ioreq',   label: 'I/O Req',  path: `M ${ior_s.x},${ior_s.y} C ${ior_cp1x},${ior_cp1y} ${ior_cp2x},${ior_cp2y} ${ior_e.x},${ior_e.y}` },
      { id: 'iodone',  label: 'I/O Done', path: `M ${iod_s.x},${iod_s.y} C ${iod_cp1x},${iod_cp1y} ${iod_cp2x},${iod_cp2y} ${iod_e.x},${iod_e.y}` },
      { id: 'exit',    label: 'Exit',     path: `M ${ex_s.x},${ex_s.y} Q ${ex_cpx},${ex_cpy} ${ex_e.x},${ex_e.y}` }

  }

  const ARROWS = buildArrows();

  // ═══════════════════════════════════════════════
  // SCENARIOS
  // ═══════════════════════════════════════════════

  const SCENARIOS_BASE = [

  // ═══════════════════════════════════════════════

  // ═══════════════════════════════════════════════

  const ALGO_DEFS = [
    {
      id: 'rr',
      name: 'Round Robin',
      desc: 'Preemptive time-slicing — each process gets a fixed quantum, then yields',
      steps: [

        { what: 'All three enter the Ready queue.', why: 'Initialization done. All three line up for CPU access — only one can run at a time.', moves: [{ pid: 'P1', from: 'new', to: 'ready' }, { pid: 'P2', from: 'new', to: 'ready' }, { pid: 'P3', from: 'new', to: 'ready' }], arrow: 'admit', action: 'Admitted' },

        { what: 'P1 is dispatched (Round 2).', why: 'P1 is at the front again. It resumes where it left off.', moves: [{ pid: 'P1', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P1 finishes and exits.', why: 'P1 completes its work this round.', moves: [{ pid: 'P1', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P3 is dispatched (Round 2).', why: 'P3 gets the CPU again to continue.', moves: [{ pid: 'P3', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P3 finishes and exits.', why: 'P3 completes its remaining work.', moves: [{ pid: 'P3', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P2 is dispatched (Round 2).', why: 'P2 finally resumes after its I/O wait.', moves: [{ pid: 'P2', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P2 finishes and exits. All done!', why: 'All three are done. Round Robin ensured fair CPU sharing — no process was starved, even when one was blocked on I/O.', moves: [{ pid: 'P2', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' }
      ]
    },
    {
      id: 'fcfs',
      name: 'FCFS',
      desc: 'First-Come First-Served — non-preemptive, processes run until they block or finish',
      steps: [
        { what: 'Three processes are created.', why: 'P1, P2, P3 are created in that order. Under FCFS, arrival order determines who runs first.', moves: [{ pid: 'P1', from: null, to: 'new' }, { pid: 'P2', from: null, to: 'new' }, { pid: 'P3', from: null, to: 'new' }], arrow: null, action: 'Created' },
        { what: 'All three enter the Ready queue.', why: 'Queue order: P1, P2, P3. Under FCFS, there is no preemption — each process runs until it finishes or blocks.', moves: [{ pid: 'P1', from: 'new', to: 'ready' }, { pid: 'P2', from: 'new', to: 'ready' }, { pid: 'P3', from: 'new', to: 'ready' }], arrow: 'admit', action: 'Admitted' },
        { what: 'P1 is dispatched.', why: 'P1 arrived first, so it gets the CPU. No timer will interrupt it — FCFS is non-preemptive.', moves: [{ pid: 'P1', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P1 requests disk I/O — moves to Blocked.', why: 'P1 voluntarily yields the CPU because it needs disk data. This is the only way a process gives up the CPU under FCFS (besides finishing).', moves: [{ pid: 'P1', from: 'running', to: 'blocked' }], arrow: 'ioreq', action: 'I/O Request', logExtra: '(Kernel execution to service the I/O request is not shown in this visualization.)' },
        { what: 'P2 is dispatched.', why: 'P2 is next in arrival order. It gets the CPU and runs uninterrupted.', moves: [{ pid: 'P2', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P1\'s I/O completes — returns to Ready.', why: 'P1\'s disk data is ready. But P2 is still running and cannot be preempted, so P1 waits in Ready.', moves: [{ pid: 'P1', from: 'blocked', to: 'ready' }], arrow: 'iodone', action: 'I/O Complete' },
        { what: 'P2 finishes and exits.', why: 'P2 ran to completion without interruption. This is the FCFS advantage: no context-switch overhead. But it means P1 and P3 waited a long time.', moves: [{ pid: 'P2', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P3 is dispatched.', why: 'P3 arrived before P1 re-entered Ready, so P3 goes next. P1 must wait even longer — this is the "convoy effect" of FCFS.', moves: [{ pid: 'P3', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P3 finishes and exits.', why: 'P3 ran uninterrupted to completion.', moves: [{ pid: 'P3', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P1 is finally dispatched again.', why: 'P1 has been waiting since its I/O finished. Under FCFS, it had to wait behind P2 and P3 with no preemption to help.', moves: [{ pid: 'P1', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P1 finishes and exits. All done!', why: 'Notice the problem: P1 arrived first but finished last because of I/O + convoy effect. FCFS is simple but can cause long wait times.', moves: [{ pid: 'P1', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' }
      ]
    },
    {
      id: 'priority',
      name: 'Priority (Preemptive)',
      desc: 'Highest-priority process always runs — with preemption when a higher-priority process becomes ready',
      steps: [
        { what: 'Three processes created with priorities.', why: 'P1 (low priority), P2 (high priority), P3 (medium priority). A real OS might assign priority based on process type — system processes often get higher priority.', moves: [{ pid: 'P1', from: null, to: 'new' }, { pid: 'P2', from: null, to: 'new' }, { pid: 'P3', from: null, to: 'new' }], arrow: null, action: 'Created' },
        { what: 'All three enter the Ready queue.', why: 'The scheduler will always pick the highest-priority process. P2 (high) will go first.', moves: [{ pid: 'P1', from: 'new', to: 'ready' }, { pid: 'P2', from: 'new', to: 'ready' }, { pid: 'P3', from: 'new', to: 'ready' }], arrow: 'admit', action: 'Admitted' },
        { what: 'P2 (high priority) is dispatched.', why: 'Priority scheduling always picks the highest-priority ready process. P2 wins over P3 (medium) and P1 (low).', moves: [{ pid: 'P2', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P2 requests I/O — moves to Blocked.', why: 'Even high-priority processes must wait for I/O. P2 voluntarily blocks.', moves: [{ pid: 'P2', from: 'running', to: 'blocked' }], arrow: 'ioreq', action: 'I/O Request', logExtra: '(Kernel execution to service the I/O request is not shown in this visualization.)' },
        { what: 'P3 (medium priority) is dispatched.', why: 'With P2 blocked, P3 is the highest-priority ready process.', moves: [{ pid: 'P3', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P2\'s I/O completes — P2 preempts P3!', why: 'P2 returns to Ready with higher priority than running P3. In preemptive priority scheduling, the OS immediately context-switches: P3 goes back to Ready and P2 gets the CPU.', moves: [{ pid: 'P2', from: 'blocked', to: 'ready' }, { pid: 'P3', from: 'running', to: 'ready' }], arrow: 'iodone', action: 'Preempted' },
        { what: 'P2 is dispatched again.', why: 'P2 has the highest priority and is ready, so it gets the CPU immediately.', moves: [{ pid: 'P2', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P2 finishes and exits.', why: 'The highest-priority process completes first. This is the strength of priority scheduling — critical tasks finish fast.', moves: [{ pid: 'P2', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P3 (medium) is dispatched.', why: 'P3 resumes. P1 (low) must keep waiting — this is the risk of starvation in priority scheduling.', moves: [{ pid: 'P3', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P3 finishes and exits.', why: 'Medium-priority process done.', moves: [{ pid: 'P3', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' },
        { what: 'P1 (low priority) is finally dispatched.', why: 'P1 ran last because it has the lowest priority. In a busy system, low-priority processes might wait indefinitely — this is called starvation.', moves: [{ pid: 'P1', from: 'ready', to: 'running' }], arrow: 'dispatch', action: 'Dispatched' },
        { what: 'P1 finishes and exits. All done!', why: 'Priority scheduling is efficient for urgent tasks but can starve low-priority processes. A common fix is "aging" — gradually boosting a process\'s priority the longer it waits.', moves: [{ pid: 'P1', from: 'running', to: 'terminated' }], arrow: 'exit', action: 'Exited' }
      ]
    }
  ];

  // Build SCENARIOS: modes 0-2 are fixed, mode 3 is dynamic per algorithm
  let SCENARIOS = [...SCENARIOS_BASE];
  let currentAlgo = 0;

  function getMode4Scenario() {
    const algo = ALGO_DEFS[currentAlgo];
    return {
      name: 'Multitasking',
      desc: algo.desc,
      processes: ['P1', 'P2', 'P3'],
      steps: algo.steps
    };
  }

  function rebuildScenarios() {
    SCENARIOS = [...SCENARIOS_BASE, getMode4Scenario()];
  }
  rebuildScenarios();

  // ═══════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════

  let currentMode = 0;
  let currentStep = -1;
  let processStates = {};
  let processActions = {};

  // ═══════════════════════════════════════════════
  // SVG RENDERING
  // ═══════════════════════════════════════════════

  const svgNS = 'http://www.w3.org/2000/svg';

  function createSVGElement(tag, attrs) {
    const el = document.createElementNS(svgNS, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function drawStateNodes() {
    const g = document.getElementById('stateNodes');
    g.innerHTML = '';
    for (const [key, s] of Object.entries(STATES)) {
      const color = COLORS[key];

      const rect = createSVGElement('rect', {
        x: s.x - s.w/2, y: s.y - s.h/2,
        width: s.w, height: s.h,
        rx: 12, ry: 12,
        fill: 'rgba(15,19,54,0.9)',
        stroke: color,
        'stroke-width': key === 'running' ? 2 : 1.2,
        'stroke-opacity': key === 'running' ? 0.7 : 0.35,
        class: 'state-node'
      });
      g.appendChild(rect);

      if (key === 'running') {
        const glow = createSVGElement('rect', {
          x: s.x - s.w/2 - 6, y: s.y - s.h/2 - 6,
          width: s.w + 12, height: s.h + 12,
          rx: 16, ry: 16,
          fill: 'none',
          stroke: color,
          'stroke-width': 1,
          opacity: 0.1,
          id: 'cpuGlow'
        });
        g.appendChild(glow);
      }

      const label = createSVGElement('text', {
        x: s.x, y: s.y - 10,
        class: 'state-label',
        'font-size': key === 'running' ? '14' : '13',
        fill: color
      });
      label.textContent = s.label;
      g.appendChild(label);

      const sub = createSVGElement('text', {
        x: s.x, y: s.y + 6,
        class: 'state-sublabel'
      });
      sub.textContent = s.sub;
      g.appendChild(sub);
    }
  }

  function drawArrows() {
    const g = document.getElementById('arrows');
    g.innerHTML = '';
    for (const a of ARROWS) {
      const path = createSVGElement('path', {
        d: a.path,
        class: 'arrow-path',
        id: 'arrow-' + a.id,
        'marker-end': 'url(#arrowhead)'
      });
      g.appendChild(path);

      // Compute midpoint of the curve for upright label placement
      const tempPath = createSVGElement('path', { d: a.path });
      g.appendChild(tempPath);
      const midLen = tempPath.getTotalLength() / 2;
      const midPt = tempPath.getPointAtLength(midLen);
      g.removeChild(tempPath);

      // Determine offset direction based on arrow
      let offsetY = -10;
      let offsetX = 0;
      if (a.id === 'ioreq') { offsetX = 12; offsetY = 0; }
      if (a.id === 'iodone') { offsetX = -12; offsetY = 0; }
      if (a.id === 'exit') { offsetY = 16; }
      if (a.id === 'timeout') { offsetY = -8; }

      if (a.label2) {
        // Two-line upright label (for timeout/preempted)
        const text1 = createSVGElement('text', {
          x: midPt.x + offsetX, y: midPt.y + offsetY - 6,
          class: 'arrow-label',
          'text-anchor': 'middle'
        });
        text1.textContent = a.label;
        g.appendChild(text1);

        const text2 = createSVGElement('text', {
          x: midPt.x + offsetX, y: midPt.y + offsetY + 6,
          class: 'arrow-label',
          'text-anchor': 'middle',
          'font-size': '9.5'
        });
        text2.textContent = '/ ' + a.label2;
        g.appendChild(text2);
      } else {
        const text = createSVGElement('text', {
          x: midPt.x + offsetX, y: midPt.y + offsetY,
          class: 'arrow-label',
          'text-anchor': 'middle'
        });
        text.textContent = a.label;
        g.appendChild(text);
      }
    }
  }

  // ═══════════════════════════════════════════════
  // DYNAMIC RENDERING
  // ═══════════════════════════════════════════════

  function renderTokens() {
    const g = document.getElementById('tokens');
    g.innerHTML = '';
    const scenario = SCENARIOS[currentMode];

    const stateGroups = {};
    for (const pid of scenario.processes) {
      const st = processStates[pid];
      if (!st) continue;
      if (!stateGroups[st]) stateGroups[st] = [];
      stateGroups[st].push(pid);
    }

    for (const pid of scenario.processes) {
      const st = processStates[pid];
      if (!st) continue;
      const group = stateGroups[st];
      const idx = group.indexOf(pid);
      const pos = getSlotPos(st, idx, group.length);
      const color = PROCESS_COLORS[scenario.processes.indexOf(pid) % PROCESS_COLORS.length];

      const tokenG = createSVGElement('g', { class: 'process-token', id: 'token-' + pid });

      const shadow = createSVGElement('circle', {
        cx: pos.x, cy: pos.y, r: TR + 2,
        fill: color, opacity: 0.12,
        filter: 'url(#glow)'
      });
      tokenG.appendChild(shadow);

      const circle = createSVGElement('circle', {
        cx: pos.x, cy: pos.y, r: TR,
        fill: 'rgba(10,14,39,0.85)',
        stroke: color, 'stroke-width': 2,
        class: 'token-circle',
        style: `color:${color}`
      });
      tokenG.appendChild(circle);

      const text = createSVGElement('text', {
        x: pos.x, y: pos.y,
        class: 'token-text'
      });
      text.textContent = pid;
      tokenG.appendChild(text);

      g.appendChild(tokenG);
    }

    const cpuGlow = document.getElementById('cpuGlow');
    if (cpuGlow) {
      const hasRunning = Object.values(processStates).includes('running');
      cpuGlow.style.animation = hasRunning ? 'cpuPulse 1.5s ease-in-out infinite' : 'none';
      cpuGlow.style.opacity = hasRunning ? '0.15' : '0.05';
    }

    // Kernel mode indicator on RUNNING box
    const existingKernel = document.getElementById('kernelIndicator');
    if (existingKernel) existingKernel.remove();
    const existingKernelBorder = document.getElementById('kernelBorder');
    if (existingKernelBorder) existingKernelBorder.remove();

    if (isKernelMode) {
      const rs = STATES.running;
      const kernelBorder = createSVGElement('rect', {
        id: 'kernelBorder',
        x: rs.x - rs.w/2, y: rs.y - rs.h/2,
        width: rs.w, height: rs.h,
        rx: 12, ry: 12,
        fill: 'rgba(255,82,82,0.06)',
        stroke: '#ff5252',
        'stroke-width': 1.5,
        'stroke-opacity': 0.5,
        'stroke-dasharray': '4 3'
      });
      g.appendChild(kernelBorder);

      const kernelLabel = createSVGElement('text', {
        id: 'kernelIndicator',
        x: rs.x, y: rs.y + 4,
        class: 'kernel-label'
      });
      kernelLabel.textContent = '⚙ KERNEL MODE';
      g.appendChild(kernelLabel);
    }
  }

  function highlightArrow(arrowId) {
    document.querySelectorAll('.arrow-path').forEach(p => {
      p.classList.remove('active', 'active-admit', 'active-dispatch', 'active-timeout', 'active-ioreq', 'active-iodone', 'active-exit', 'flash-overlay');
      p.setAttribute('marker-end', 'url(#arrowhead)');
    });
    if (!arrowId) return;
    const el = document.getElementById('arrow-' + arrowId);
    if (el) {
      el.classList.add('active', 'active-' + arrowId, 'flash-overlay');
      el.setAttribute('marker-end', 'url(#arrowhead-active)');
      setTimeout(() => el.classList.remove('flash-overlay'), 800);
    }
  }

  function updateDescription(step) {
    const descWhat = document.getElementById('descWhat');
    const descWhy = document.getElementById('descWhy');
    if (!step) {
      descWhat.textContent = 'Select a scenario and press Next to begin.';
      descWhy.textContent = 'Each step simulates an OS event that moves processes between states.';
      return;
    }
    descWhat.textContent = step.what;
    descWhy.textContent = step.why;
  }

  function updateTable() {
    const tbody = document.getElementById('procTableBody');
    const scenario = SCENARIOS[currentMode];
    tbody.innerHTML = '';
    for (const pid of scenario.processes) {
      const st = processStates[pid];
      if (!st) continue;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-weight:600; color:${PROCESS_COLORS[scenario.processes.indexOf(pid) % PROCESS_COLORS.length]}">${pid}</td>
        <td><span class="state-dot ${st}"></span>${st.charAt(0).toUpperCase() + st.slice(1)}</td>
        <td style="color:var(--text-dim)">${processActions[pid] || '—'}</td>
      `;
      tbody.appendChild(tr);
    }
  }

  function addLogEntry(stepNum, text) {
    const log = document.getElementById('eventLog');
    if (log.querySelector('.log-empty')) log.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-step">[Step ${stepNum}]</span> ${text}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function clearLog() {
    document.getElementById('eventLog').innerHTML = '<div class="log-empty">Awaiting first event…</div>';
  }

  function updateControls() {
    const scenario = SCENARIOS[currentMode];
    const total = scenario.steps.length;
    const container = document.getElementById('controls');
    container.innerHTML = '';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'ctrl-btn';
    prevBtn.innerHTML = '← Prev';
    prevBtn.disabled = currentStep < 0;
    prevBtn.onclick = prevStep;
    container.appendChild(prevBtn);

    const counter = document.createElement('span');
    counter.className = 'step-counter';
    counter.textContent = currentStep < 0 ? `0 / ${total}` : `${currentStep + 1} / ${total}`;
    container.appendChild(counter);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'ctrl-btn primary';
    nextBtn.innerHTML = 'Next →';
    nextBtn.disabled = currentStep >= total - 1;
    nextBtn.onclick = nextStep;
    container.appendChild(nextBtn);

    const resetBtn = document.createElement('button');
    resetBtn.className = 'ctrl-btn';
    resetBtn.innerHTML = '↺ Reset';
    resetBtn.onclick = resetScenario;
    container.appendChild(resetBtn);
  }

  // ═══════════════════════════════════════════════
  // STEP ENGINE
  // ═══════════════════════════════════════════════

  let isKernelMode = false;

  function applyStep(stepIndex) {
    const scenario = SCENARIOS[currentMode];
    const step = scenario.steps[stepIndex];
    for (const move of step.moves) {
      processStates[move.pid] = move.to;
      processActions[move.pid] = step.action;
    }
    isKernelMode = !!step.kernelMode;
    highlightArrow(step.arrow);
    renderTokens();
    updateDescription(step);
    updateTable();
    const movedPids = step.moves.length > 0 ? step.moves.map(m => m.pid).join(', ') + ': ' : '';
    let logText = `${movedPids}${step.what}`;
    if (step.logExtra) logText += ' ' + step.logExtra;
    addLogEntry(stepIndex + 1, logText);
  }

  function nextStep() {
    const scenario = SCENARIOS[currentMode];
    if (currentStep >= scenario.steps.length - 1) return;
    currentStep++;
    applyStep(currentStep);
    updateControls();
  }

  function prevStep() {
    if (currentStep < 0) return;
    currentStep--;
    rebuildState();
    updateControls();
  }

  function rebuildState() {
    const scenario = SCENARIOS[currentMode];
    processStates = {};
    processActions = {};
    isKernelMode = false;
    clearLog();
    if (currentStep < 0) {
      highlightArrow(null);
      renderTokens();
      updateDescription(null);
      updateTable();
      return;
    }
    for (let i = 0; i <= currentStep; i++) {
      const step = scenario.steps[i];
      for (const move of step.moves) {
        processStates[move.pid] = move.to;
        processActions[move.pid] = step.action;
      }
      if (i === currentStep) isKernelMode = !!step.kernelMode;
      const movedPids = step.moves.length > 0 ? step.moves.map(m => m.pid).join(', ') + ': ' : '';
      let logText = `${movedPids}${step.what}`;
      if (step.logExtra) logText += ' ' + step.logExtra;
      addLogEntry(i + 1, logText);
    }
    const step = scenario.steps[currentStep];
    highlightArrow(step.arrow);
    renderTokens();
    updateDescription(step);
    updateTable();
  }

  function resetScenario() {
    currentStep = -1;
    processStates = {};
    processActions = {};
    isKernelMode = false;
    highlightArrow(null);
    clearLog();
    renderTokens();
    updateDescription(null);
    updateTable();
    updateControls();
  }

  function loadMode(index) {
    currentMode = index;
    resetScenario();
    document.querySelectorAll('.mode-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === index);
    });
    // Show/hide algo bar
    const algoBar = document.getElementById('algoBar');
    const mainWrap = document.getElementById('mainWrap');
    if (index === 3) {
      algoBar.classList.add('visible');
      mainWrap.classList.add('has-algo');
    } else {
      algoBar.classList.remove('visible');
      mainWrap.classList.remove('has-algo');
    }
  }

  function loadAlgo(index) {
    currentAlgo = index;
    rebuildScenarios();
    resetScenario();
    document.querySelectorAll('.algo-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === index);
    });
  }

  // ═══════════════════════════════════════════════
  // MODE BAR & ALGO BAR
  // ═══════════════════════════════════════════════

  function renderModeBar() {
    const bar = document.getElementById('modeBar');
    bar.innerHTML = '';
    const names = ['Happy Path', 'Preemption', 'I/O Blocking', 'Multitasking'];
    names.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (i === 0 ? ' active' : '');
      btn.innerHTML = `<span class="mode-num">${i+1}</span>${name}`;
      btn.onclick = () => loadMode(i);
      bar.appendChild(btn);
    });
  }

  function renderAlgoBar() {
    const bar = document.getElementById('algoBar');
    // Keep the label, add buttons
    ALGO_DEFS.forEach((algo, i) => {
      const btn = document.createElement('button');
      btn.className = 'algo-btn' + (i === 0 ? ' active' : '');
      btn.textContent = algo.name;
      btn.title = algo.desc;
      btn.onclick = () => loadAlgo(i);
      bar.appendChild(btn);
    });
  }

  // ═══════════════════════════════════════════════
  // KEYBOARD
  // ═══════════════════════════════════════════════

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case 'ArrowRight': case ' ': e.preventDefault(); nextStep(); break;
      case 'ArrowLeft': e.preventDefault(); prevStep(); break;
      case 'r': case 'R': resetScenario(); break;
      case '1': loadMode(0); break;
      case '2': loadMode(1); break;
      case '3': loadMode(2); break;
      case '4': loadMode(3); break;
    }
  });

  // ═══════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════

  drawStateNodes();
  drawArrows();
  renderModeBar();
  renderAlgoBar();
  resetScenario();
  updateControls();

})();
</script>
</body>
</html>
